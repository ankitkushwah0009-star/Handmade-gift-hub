<!DOCTYPE html>
<html>
<head>
<title>Handmade Gift Hub</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
background:#ff4d6d;
color:white;
padding:15px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;
margin-top:5px;
}

select{
padding:5px;
margin-top:5px;
}

</style>

<script>

function order(product){

var qty = document.getElementById(product+"qty").value;

var message = "Hello, mujhe " + product + " ke " + qty + " piece chahiye";

var url = "https://wa.me/918923122302?text=" + encodeURIComponent(message);

window.open(url);

}

</script>

</head>

<option>3</option>
<option>5</option>
<option>10</option>
